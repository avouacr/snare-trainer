<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Batuc Trainer</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>Batuc Trainer</h1>
  </header>

  <main>

    <!-- Controls -->
    <section class="controls">
      <div class="control-group">
        <label for="pattern-select">Pattern</label>
        <select id="pattern-select"></select>
      </div>

      <div class="control-group">
        <label for="bpm-input">BPM</label>
        <input id="bpm-input" type="number" min="40" max="300" value="90" style="width:5rem">
      </div>

      <button id="btn-play" class="btn-primary">Start</button>
    </section>

    <!-- Pattern strip -->
    <section class="panel">
      <h2>Pattern</h2>
      <div id="pattern-strip" class="pattern-strip"></div>
    </section>

    <!-- Timing panel -->
    <section class="panel">
      <h2>Timing</h2>
      <div class="timing-legend">
        <span>early</span>
        <span>on time</span>
        <span>late</span>
      </div>
      <div id="timing-bars" class="timing-bars"></div>
    </section>

  </main>

  <script src="/static/app.js"></script>
</body>
</html>
