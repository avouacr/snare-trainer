<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snare Trainer</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>Snare Trainer</h1>
  </header>

  <main>

    <!-- Controls -->
    <section class="controls">
      <div class="control-group">
        <label for="pattern-select">Pattern</label>
        <select id="pattern-select"></select>
      </div>

      <div class="control-group">
        <label for="bpm-input">BPM</label>
        <input id="bpm-input" type="number" min="40" max="300" value="90" style="width:5rem">
      </div>

      <button id="btn-play" class="btn-primary">Start</button>

      <button id="btn-calibrate" class="btn-secondary">Calibrate</button>

      <div class="control-group">
        <label>Latency offset <span id="latency-display">200ms</span></label>
      </div>
    </section>

    <!-- Calibration status -->
    <div id="cal-status"></div>
    <div id="cal-progress"></div>

    <!-- Pattern strip -->
    <section class="panel">
      <h2>Pattern</h2>
      <div id="pattern-strip" class="pattern-strip"></div>
    </section>

    <!-- Performance panel -->
    <section class="panel">
      <h2>Performance</h2>
      <div class="perf-row">
        <canvas id="perf-canvas" class="perf-canvas"></canvas>
        <div class="vel-meter">
          <div class="vel-track">
            <div id="vel-fill" class="vel-fill"></div>
          </div>
          <div id="vel-label" class="vel-label">—</div>
        </div>
      </div>
    </section>

  </main>

  <script src="/static/app.js"></script>
</body>
</html>
